<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Türkiye Dalış Rehberi Pro</title>
<!-- Leaflet CSS & JS -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+3:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
  :root {
    --navy: #09131f; --teal: #1A7A8A; --teal-glow: rgba(26,122,138,0.5);
    --teal-bright: #22d3ee; --teal-soft: rgba(26,122,138,0.15);
    --c1: #3498db; --c2: #2ecc71; --c3: #ff4757; --c4: #9b59b6; --c5: #e67e22; --gold: #f1c40f;
    --diff-easy: #2ecc71; --diff-med: #f39c12; --diff-hard: #e74c3c;
    --icon-scale: 0.55;
    --site-label-size: 1.4rem;
    --glass: rgba(255,255,255,0.04);
    --glass-border: rgba(255,255,255,0.08);
    --gradient-header: linear-gradient(135deg, #09131f 0%, #0c1e32 50%, #091820 100%);
  }
  
  html, body { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: var(--navy); color: #fff; font-family: 'Source Sans 3', sans-serif; }
  body { display: flex; flex-direction: column; }

  /* ── HEADER ── */
  .header {
    flex-shrink: 0;
    background: var(--gradient-header);
    padding: 14px 30px;
    border-bottom: 1px solid rgba(26,122,138,0.4);
    box-shadow: 0 4px 30px rgba(26,122,138,0.15), 0 1px 0 rgba(255,255,255,0.03);
    z-index: 100; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px;
    position: relative;
  }
  .header::after {
    content: ''; position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--teal), rgba(34,211,238,0.55), var(--teal), transparent);
    opacity: 0.5;
  }
  .header-title h1 { font-family:'Playfair Display',serif; font-size:1.65rem; margin:0; letter-spacing:-0.01em; text-shadow: 0 2px 8px rgba(0,0,0,0.4); }
  .header-title h1 span { color: var(--teal); }
  .header-title p { font-size:.72rem; color:#7090a8; margin:4px 0 0 0; letter-spacing:.06em; text-transform:uppercase; font-weight:600; }

  .top-tools { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

  .badge-row { display:flex; gap:6px; flex-wrap:wrap; }
  .badge { display:flex; align-items:center; gap:6px; padding:4px 11px; border-radius:20px; font-size:.67rem; font-weight:700; background:rgba(255,255,255,0.05); border:1px solid rgba(255,255,255,0.08); letter-spacing:.04em; backdrop-filter:blur(8px); transition:all 0.25s; }
  .badge:hover { background:rgba(255,255,255,0.09); border-color:rgba(255,255,255,0.15); }
  .badge-dot { width:7px; height:7px; border-radius:50%; flex-shrink:0; }

  .tool-btn { background:rgba(255,255,255,0.07); border:1px solid rgba(26,122,138,0.55); color:#c8e4ee; padding:6px 13px; border-radius:20px; font-size:0.78rem; cursor:pointer; transition:all 0.2s; display:flex; align-items:center; gap:6px; font-weight:600; backdrop-filter:blur(8px); }
  .tool-btn svg { width:14px; height:14px; flex-shrink:0; }
  .tool-btn.active { background:linear-gradient(135deg,rgba(26,122,138,0.6),rgba(26,122,138,0.4)); border-color:rgba(34,211,238,0.45); color:#fff; box-shadow:0 0 14px rgba(26,122,138,0.4),inset 0 1px 0 rgba(255,255,255,0.08); }

  @media (hover: hover) {
    .tool-btn:hover { background:linear-gradient(135deg,rgba(26,122,138,0.38),rgba(26,122,138,0.22)); border-color:rgba(26,122,138,0.75); color:#fff; box-shadow:0 0 10px rgba(26,122,138,0.28); }
  }
  
  /* ── CUSTOM DROPDOWN ── */
  .dd-wrap { position: relative; display: inline-block; }
  .dd-trigger { display:flex; align-items:center; gap:7px; padding:6px 14px; border:1px solid rgba(26,122,138,0.5); border-radius:20px; background:rgba(255,255,255,0.06); color:#c8e4ee; font-size:.78rem; font-weight:600; cursor:pointer; transition:all 0.2s; white-space:nowrap; user-select:none; backdrop-filter:blur(8px); }
  .dd-trigger svg { width:13px; height:13px; flex-shrink:0; opacity:0.8; }
  .dd-trigger:hover { background:rgba(26,122,138,0.2); border-color:rgba(26,122,138,0.75); }
  .dd-trigger .dd-arrow { font-size:.6rem; opacity:.6; transition:transform 0.2s; margin-left:2px; }
  .dd-wrap.open .dd-trigger { background:rgba(26,122,138,0.26); border-color:rgba(34,211,238,0.45); }
  .dd-wrap.open .dd-arrow { transform:rotate(180deg); }
  .dd-menu { position:absolute; top:calc(100% + 7px); left:0; min-width:180px; background:rgba(7,14,24,0.97); border:1px solid rgba(26,122,138,0.45); border-radius:14px; box-shadow:0 12px 40px rgba(0,0,0,0.7),0 0 0 1px rgba(26,122,138,0.08); z-index:9999; overflow:hidden; opacity:0; transform:translateY(-6px); pointer-events:none; transition:opacity 0.18s,transform 0.18s; backdrop-filter:blur(16px); }
  .dd-wrap.open .dd-menu { opacity:1; transform:translateY(0); pointer-events:all; }
  .dd-item { display:flex; align-items:center; gap:9px; padding:10px 16px; font-size:.8rem; font-weight:600; color:#b8ccd8; cursor:pointer; transition:background 0.15s; }
  .dd-item:hover { background:rgba(26,122,138,0.2); color:#e8f4ff; }
  .dd-item.active { color:#7ed6f7; background:rgba(14,77,110,0.4); }
  .dd-item .dd-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
  .dd-item .dd-flag { font-size:1.1rem; line-height:1; }
  .dd-divider { height:1px; background:rgba(255,255,255,.06); margin:4px 0; }
  .dd-header { padding:7px 16px 4px; font-size:.63rem; text-transform:uppercase; letter-spacing:.1em; color:#3a6a8a; font-weight:700; }
  .dd-trigger.has-filter { background:rgba(14,77,110,0.42); border-color:rgba(126,214,247,0.55); color:#7ed6f7; }

  /* ── DEPTH FILTER ── */
  .depth-sep { width:1px; height:20px; background:rgba(255,255,255,.1); margin:0 2px; }

  /* ── FILTERS ── */
  .filters { flex-shrink:0; background:linear-gradient(180deg,rgba(10,22,36,0.9) 0%,rgba(9,19,31,0.8) 100%); border-bottom:1px solid rgba(26,122,138,0.15); padding:9px 30px; display:flex; gap:7px; flex-wrap:wrap; align-items:center; z-index:90; }
  .filter-btn { padding:5px 14px; border-radius:20px; border:1px solid rgba(255,255,255,0.13); background:rgba(255,255,255,0.05); color:#b0c8d8; font-size:.78rem; cursor:pointer; font-weight:600; transition:all 0.2s; backdrop-filter:blur(6px); }
  .filter-btn:hover { border-color:rgba(26,122,138,0.5); color:#e8f4ff; background:rgba(26,122,138,0.1); }
  .filter-btn.active { background:linear-gradient(135deg,rgba(26,122,138,0.65),rgba(26,122,138,0.45)); border-color:rgba(34,211,238,0.38); color:#fff; box-shadow:0 2px 10px rgba(26,122,138,0.28); }

  .search-wrap { margin-left:auto; }
  .search-wrap input { background:rgba(0,0,0,0.28); border:1px solid rgba(255,255,255,0.13); color:#fff; padding:6px 14px; border-radius:20px; outline:none; width:185px; transition:all 0.3s; font-family:'Source Sans 3',sans-serif; font-size:0.79rem; }
  .search-wrap input:focus { border-color:rgba(26,122,138,0.65); box-shadow:0 0 0 3px rgba(26,122,138,0.1); background:rgba(0,0,0,0.38); width:210px; }

  /* ── TOAST ── */
  #toast { position:fixed; bottom:30px; left:50%; transform:translateX(-50%) translateY(20px); background:rgba(6,13,22,0.95); border:1px solid rgba(26,122,138,0.5); color:#8ec8d8; font-size:.79rem; font-weight:600; padding:10px 22px; border-radius:24px; z-index:9999; opacity:0; transition:opacity 0.3s,transform 0.3s; pointer-events:none; white-space:nowrap; backdrop-filter:blur(16px); box-shadow:0 8px 24px rgba(0,0,0,0.5),0 0 0 1px rgba(26,122,138,0.08); }
  #toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  /* ── MAIN AREA ── */
  .main { flex: 1; display: flex; position: relative; overflow: hidden; }
  #map { flex: 1; background: #000; z-index: 1; }



  /* ── KADEMELİ BİLGİ ETİKETLERİ (Tamamen Doğal Harita Görünümü) ── */
  .map-label-city {
    background: transparent; border: none; box-shadow: none;
    color: #fff;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.95rem;
    font-weight: 700;
    text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000, 0px 2px 5px rgba(0,0,0,0.8);
    text-align: center; white-space: nowrap;
    opacity: 0 !important; transition: opacity 0.5s ease-in-out;
    pointer-events: none !important;
  }
  .map-label-district {
    background: transparent; border: none; box-shadow: none;
    color: #e2e8f0;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.85rem;
    font-weight: 600;
    text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    text-align: center; white-space: nowrap;
    opacity: 0 !important; transition: opacity 0.5s ease-in-out;
    pointer-events: none !important;
  }
  .map-label-geo {
    background: transparent; border: none; box-shadow: none;
    color: #94a3b8;
    font-family: 'Source Sans 3', sans-serif;
    font-size: 0.8rem;
    font-style: italic;
    font-weight: 600;
    text-shadow: -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    text-align: center; white-space: nowrap;
    opacity: 0 !important; transition: opacity 0.5s ease-in-out;
    pointer-events: none !important;
  }

  /* Dalış Noktası Etiketleri (Zoom in ile dinamik küçülür) */
  .map-label-site {
    background: transparent !important; border: none !important; box-shadow: none !important;
    color: #fff !important;
    font-family: 'Source Sans 3', sans-serif !important;
    font-size: var(--site-label-size) !important;
    font-weight: 700 !important;
    text-shadow: 0px 2px 4px rgba(0,0,0,1), 0px 0px 4px rgba(0,0,0,0.8) !important;
    margin-top: 15px !important;
    opacity: 0 !important; 
    transition: opacity 0.3s ease-in-out, font-size 0.2s ease-out !important;
    pointer-events: none !important;
  }
  .map-label-site::before { display: none !important; }

  /* Zoom Seviyesine Göre Görünürlük */
  #map.show-sites .map-label-site { opacity: 1 !important; }
  #map.show-cities .map-label-city { opacity: 1 !important; }
  #map.show-districts .map-label-district { opacity: 1 !important; }
  #map.show-geo .map-label-geo { opacity: 1 !important; }

  .dynamic-svg {
    transform: scale(var(--icon-scale));
    transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    transform-origin: center center;
    filter: drop-shadow(0px 0px 4px rgba(255,255,255,0.4)) drop-shadow(0px 4px 6px rgba(0,0,0,0.8));
  }

  /* ── DETAIL PANEL ── */
  #detail-panel {
    position: absolute; bottom: 20px; left: 20px; width: 318px; max-height: calc(100vh - 185px);
    background: rgba(6,13,22,0.97); border: 1px solid rgba(26,122,138,0.42); border-radius: 16px;
    overflow: hidden; display: flex; flex-direction: column; z-index: 500;
    box-shadow: 0 12px 40px rgba(0,0,0,0.75), 0 0 0 1px rgba(26,122,138,0.08), 0 0 60px rgba(26,122,138,0.04);
    transform: translateX(-380px); transition: transform 0.35s cubic-bezier(0.4,0,0.2,1); pointer-events: none;
    backdrop-filter: blur(12px);
  }
  #detail-panel.open { transform: translateX(0); pointer-events: all; }
  #detail-panel-body { overflow-y: auto; flex: 1; scrollbar-width: thin; scrollbar-color: rgba(26,122,138,0.5) transparent; }
  #detail-panel-body::-webkit-scrollbar { width: 3px; }
  #detail-panel-body::-webkit-scrollbar-track { background: transparent; }
  #detail-panel-body::-webkit-scrollbar-thumb { background: rgba(26,122,138,0.45); border-radius: 2px; }
  #detail-close {
    position: absolute; top: 9px; right: 10px;
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.65); border-radius: 50%; width: 26px; height: 26px;
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    z-index: 10; transition: all 0.15s;
  }
  #detail-close svg { width: 10px; height: 10px; }
  #detail-close:hover { background: rgba(231,76,60,0.45); border-color: rgba(231,76,60,0.35); color: #fff; }

  .popup-body { padding: 14px; }
  .popup-koridor { font-size:.63rem; font-weight:700; text-transform:uppercase; letter-spacing:.1em; margin-bottom:5px; opacity:0.8; }
  .popup-name { font-family:'Playfair Display',serif; font-size:1.15rem; font-weight:900; margin-bottom:7px; border-bottom:1px solid rgba(255,255,255,0.07); padding-bottom:8px; padding-right:28px; line-height:1.3; }
  .popup-tag { font-size:.62rem; font-weight:700; padding:3px 8px; border-radius:12px; background:rgba(255,255,255,.07); border:1px solid rgba(255,255,255,0.07); margin-right:4px; display:inline-block; margin-bottom:4px; letter-spacing:.04em; }
  .popup-desc { font-size:.8rem; line-height:1.5; color:#a8bccc; margin-bottom:10px; }
  .popup-stats { display:grid; grid-template-columns:1fr 1fr; gap:6px; margin-bottom:10px; }
  .popup-stat { background:rgba(255,255,255,0.04); border:1px solid rgba(255,255,255,0.06); border-radius:8px; padding:6px 8px; }
  .popup-stat-label { font-size:.57rem; color:#3a6a8a; font-weight:700; text-transform:uppercase; letter-spacing:.07em; margin-bottom:2px; }
  .popup-stat-value { font-size:.8rem; font-weight:700; color:#dce8f2; }
  .dist-badge { background:rgba(46,204,113,0.1); border:1px solid rgba(46,204,113,0.3); color:#2ecc71; padding:4px 10px; border-radius:8px; font-size:0.72rem; font-weight:700; margin-bottom:10px; display:none; align-items:center; gap:5px; }
  .dist-badge svg { width:11px; height:11px; flex-shrink:0; }
  .cert-badge { display:inline-block; background:rgba(231,76,60,.09); border:1px solid rgba(231,76,60,.28); color:#e74c3c; font-size:.6rem; font-weight:700; padding:2px 8px; border-radius:12px; margin-bottom:5px; letter-spacing:.04em; }
  .marine-data { background:rgba(255,255,255,0.03); border:1px solid rgba(255,255,255,0.06); border-radius:10px; padding:8px 10px; font-size:0.75rem; margin-bottom:8px; }
  .md-row { display:flex; justify-content:space-between; align-items:center; padding:3px 0; border-bottom:1px solid rgba(255,255,255,0.05); color:#7090a8; }
  .md-row:last-child { border-bottom:none; }
  .md-row span:last-child { color:#dce8f2; font-weight:600; }
  .photo-search-bar { display:grid; grid-template-columns:1fr 1fr; gap:5px; padding:10px 12px 12px; background:rgba(3,9,16,0.8); border-top:1px solid rgba(255,255,255,0.04); }
  .photo-search-btn { display:flex; align-items:center; justify-content:center; gap:5px; padding:8px; border-radius:8px; border:1px solid rgba(255,255,255,0.08); font-size:.74rem; font-weight:600; cursor:pointer; text-decoration:none; white-space:nowrap; color:#b8ccd8; background:rgba(255,255,255,0.05); transition:all 0.15s; }
  .photo-search-btn:hover { background:rgba(26,122,138,0.18); border-color:rgba(26,122,138,0.38); color:#fff; }
  .photo-search-btn svg { width:13px; height:13px; flex-shrink:0; opacity:0.8; }
  .photo-search-label { grid-column:1/-1; font-size:.57rem; color:#2a4a60; text-align:center; margin-top:2px; font-style:italic; }

  /* ── OKUL POPUP (Leaflet popup) ── */
  .popup-inner { padding:10px 12px; }
  .popup-title { font-family:'Playfair Display',serif; font-size:1rem; font-weight:900; margin-bottom:5px; line-height:1.3; }
  .popup-info-row { display:flex; align-items:center; gap:6px; font-size:.77rem; color:#8cacbc; margin-bottom:4px; }
  .popup-info-row svg { width:12px; height:12px; flex-shrink:0; opacity:0.65; color:#6090a8; }
  .popup-info-row a { color:var(--teal); text-decoration:none; }
  .popup-info-row a:hover { text-decoration:underline; }

  @media(max-width:768px) {
    #detail-panel { left: 10px; right: 10px; width: auto; bottom: 10px; max-height: 50vh; transform: translateY(110%); }
    #detail-panel.open { transform: translateY(0); }
  }

  .locate-btn {
    position: absolute; bottom: 25px; right: 375px; z-index: 1000;
    width: 44px; height: 44px;
    background: linear-gradient(135deg, rgba(26,122,138,0.28), rgba(9,19,31,0.88));
    border: 1.5px solid rgba(26,122,138,0.6); border-radius: 50%; color: var(--teal);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 20px rgba(26,122,138,0.22), inset 0 1px 0 rgba(255,255,255,0.04);
    transition: all 0.2s; backdrop-filter: blur(10px);
  }
  .locate-btn svg { width: 20px; height: 20px; }
  .locate-btn:hover { box-shadow: 0 4px 22px rgba(26,122,138,0.42), 0 0 0 4px rgba(26,122,138,0.1); border-color: rgba(34,211,238,0.55); }
  .locate-btn:active { transform: scale(0.9); }

  /* ── SIDEBAR ── */
  .sidebar { width: 350px; background: rgba(6,13,22,0.99); overflow-y: auto; border-left: 1px solid rgba(26,122,138,0.28); z-index: 2; scrollbar-width: thin; scrollbar-color: rgba(26,122,138,0.35) transparent; }
  .sidebar::-webkit-scrollbar { width: 3px; }
  .sidebar::-webkit-scrollbar-track { background: transparent; }
  .sidebar::-webkit-scrollbar-thumb { background: rgba(26,122,138,0.35); border-radius: 2px; }
  .sidebar-section-header { padding:12px 20px; display:flex; align-items:center; gap:10px; cursor:pointer; background:linear-gradient(180deg,rgba(9,19,31,0.98) 0%,rgba(7,16,26,0.95) 100%); border-bottom:1px solid rgba(255,255,255,.05); position:sticky; top:0; z-index:5; transition:background 0.2s; }
  .sidebar-section-header:hover { background:linear-gradient(180deg,rgba(14,28,44,0.98) 0%,rgba(11,22,36,0.95) 100%); }
  .ssh-dot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
  .ssh-title { font-family:'Playfair Display',serif; font-size:.92rem; font-weight:700; flex:1; }
  .ssh-count { font-size:.66rem; background:rgba(26,122,138,.22); padding:2px 7px; border-radius:10px; font-weight:700; color:#7ed6f7; }
  .ssh-toggle { font-size:.6rem; color:#3a6a8a; transition:transform 0.25s,color 0.2s; }
  .sidebar-section.expanded .ssh-toggle { transform: rotate(180deg); color: var(--teal); }
  .sidebar-section-content { display: none; }
  .sidebar-section.expanded .sidebar-section-content { display: block; }
  .site-item { padding:10px 18px 10px 20px; cursor:pointer; border-bottom:1px solid rgba(255,255,255,.025); border-left:3px solid transparent; transition:all 0.18s; }
  .site-item:hover { background:rgba(26,122,138,.07); border-left-color:rgba(26,122,138,0.38); }
  .site-item:active { background:rgba(26,122,138,.12); }
  .site-item.highlighted { border-left-color:var(--teal); background:rgba(26,122,138,.16); }
  .site-item-name { font-size:.84rem; font-weight:600; margin-bottom:4px; color:#dce8f2; line-height:1.3; }
  .site-item-meta { font-size:.67rem; color:#4a6a80; display:flex; align-items:center; gap:5px; }
  .site-item-meta svg { width:10px; height:10px; flex-shrink:0; }

  @media(max-width:768px) {
    .header { padding: 13px 18px; flex-direction: column; align-items: flex-start; }
    .top-tools { width: 100%; justify-content: space-between; }
    .badge-row { width: 100%; margin-bottom: 4px; }
    .main { flex-direction: column; }
    .sidebar { width: 100%; height: 40vh; }
    .locate-btn { bottom: 42vh; right: 15px; }
  }
</style>
</head>
<body>

<div class="header">
  <div class="header-title">
    <h1 id="ui-title">Türkiye <span>Dalış Noktaları</span></h1>
    <p id="ui-subtitle">Gerçek Koordinatlı Dalış Envanteri</p>
  </div>
  <div class="top-tools">
    <div class="badge-row" id="badge-row"></div>
    <button class="tool-btn" id="seaMapToggle" title="Denizcilik Haritası Katmanını Aç/Kapat"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M2 12c1-2 3-2 4 0s3 2 4 0 3-2 4 0 3 2 4 0"/><path d="M2 17c1-2 3-2 4 0s3 2 4 0 3-2 4 0 3 2 4 0"/><path d="M2 7c1-2 3-2 4 0s3 2 4 0 3-2 4 0 3 2 4 0"/></svg> <span id="seaMapLabel">Deniz Haritası</span></button>

  // ── ZOOM YÖNETİCİSİ (Yazıları Küçülten Ters Orantı) ──
  function handleZoom() {
    const z = map.getZoom();
    
    // İkonlar yaklaştıkça hafif büyür
    let scale = 0.50 + ((z - 6) * 0.12); 
    if(scale < 0.40) scale = 0.40; 
    if(scale > 1.3) scale = 1.3; 
    document.documentElement.style.setProperty('--icon-scale', scale);

    // Yazı boyutu: zoom arttıkça hafifçe küçülür ama her zaman okunabilir
    let labelSize;
    if (z <= 7) {
      labelSize = 0.72;
    } else if (z <= 9) {
      labelSize = 0.85;
    } else if (z <= 11) {
      labelSize = 0.72;
    } else {
      labelSize = 0.62;
    }
    document.documentElement.style.setProperty('--site-label-size', labelSize + 'rem');
    // Hiçbir zaman tamamen gizleme
    const mapEl2 = document.getElementById('map');
    mapEl2.classList.remove('hide-site-labels');

    const mapEl = document.getElementById('map');
    mapEl.classList.remove('show-cities', 'show-districts', 'show-geo', 'show-sites');
    
    // Kademeli Gösterim: şehir > ilçe > dalış noktası
    if (z <= 6) {
      mapEl.classList.add('show-cities');
    } else if (z >= 7 && z < 8) {
      mapEl.classList.add('show-cities', 'show-districts');
    } else if (z >= 8 && z < 10) {
      mapEl.classList.add('show-districts', 'show-geo', 'show-sites');
    } else if (z >= 10) {
      mapEl.classList.add('show-districts', 'show-geo', 'show-sites');
    }
  }
  map.on('zoomend', handleZoom);

  function drawRegionLabels() {

      const text = lang === 'en' ? lbl.en : lbl.tr;
      let className = 'map-label-geo';

  function makeIcon(baseColor, gem, isSchool=false, overrideDifficultyColor=null) {
    if(isSchool) {
      return L.divIcon({ html: `<svg class="dynamic-svg" width="28" height="28" viewBox="0 0 24 24"><rect width="20" height="14" x="2" y="5" fill="#e74c3c" rx="2"/><path d="M2 5 L22 19" stroke="#fff" stroke-width="3"/></svg>`, className:'', iconSize:[28,28], iconAnchor:[14,14], popupAnchor:[0,-14] });
    }

    // Zorluk modunda tamamen bağımsız renkler; koridor rengiyle karışmaz
    const fillColor = overrideDifficultyColor || baseColor;
    const cy = gem ? 13 : 11;
    const r = gem ? 11 : 9;
    const innerSymbol = gem ? `<text x="12" y="${cy+4}" text-anchor="middle" font-size="8" fill="#fff" font-weight="bold">★</text>` : '';

    const svg = `<svg class="dynamic-svg" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
      <circle cx="12" cy="${cy}" r="${r}" fill="${fillColor}" stroke="#fff" stroke-width="2.2"/>
      ${innerSymbol}
    </svg>`;
    return L.divIcon({ html: svg, className:'', iconSize:[24,24], iconAnchor:[12,11], popupAnchor:[0,-11] });
  }

      <div class="badge"><div class="badge-dot" style="background:var(--c1)"></div><span>${i18n[lang].c_can}</span></div>
      <div class="badge"><div class="badge-dot" style="background:var(--c2)"></div><span>${i18n[lang].c_ege}</span></div>
      <div class="badge"><div class="badge-dot" style="background:var(--c3)"></div><span>${i18n[lang].c_akd}</span></div>

  function drawMap() {
    siteLayer.clearLayers();
    schoolLayer.clearLayers();
    
    SITES.forEach(s => {
      if(!matches(s)) return;
      const baseRegionColor = KORIDOR_CONFIG[s.koridor].color;
      const icon = makeIcon(baseRegionColor, s.gem, false, null);
      
      const turTags = s.tur.map(t => `<span class="popup-tag">${dictTur[t][lang]}</span>`).join('');
      const koridorLabel = KORIDOR_CONFIG[s.koridor]["label_" + lang];
      const seviyeLabel = lang === 'en' ? (dictSeviye[s.seviye] || s.seviye) : s.seviye;
      const descText = lang === 'en' && s.desc_en ? s.desc_en : s.desc;
      const siteName = lang === 'en' && s.name_en ? s.name_en : s.name;

      const m = L.marker([s.lat,s.lng], {icon});
      m.bindTooltip(siteName, { permanent: true, direction: 'bottom', className: 'map-label-site', offset: [0, 10] });

      m.on('click', async () => {
        const panel = document.getElementById('detail-panel');
        const body  = document.getElementById('detail-panel-body');

        // İçeriği doldur
        body.innerHTML = `
          <div class="popup-body">
            <div class="popup-koridor" style="color:${baseRegionColor}">${koridorLabel}</div>
            <div class="popup-name">${siteName} ${s.gem ? '💎' : ''}</div>
            <div class="popup-tags">${turTags}</div>
            <div class="dist-badge" id="dist-${s.id}" style="display:none;">${SVG.pin} <span></span></div>
            <div class="popup-desc">${descText}</div>
            <div class="popup-stats">
              <div class="popup-stat"><div class="popup-stat-label">${i18n[lang].depth}</div><div class="popup-stat-value">${s.derinlik}</div></div>
              <div class="popup-stat"><div class="popup-stat-label">${i18n[lang].level}</div><div class="popup-stat-value">${seviyeLabel}</div></div>
            </div>
            <div id="marine-${s.id}" class="marine-data">${i18n[lang].wait}</div>
            <div id="sb-${s.id}" class="search-bar-slot"></div>
          </div>`;

        panel.classList.add('open');
        // Seçili sidebar item'ı vurgula
        document.querySelectorAll('.site-item').forEach(el => el.classList.remove('highlighted'));
        const el = document.querySelector(`.site-item[data-id="${s.id}"]`);
        if (el) el.classList.add('highlighted');

        // Galeri / linkler
        loadGallery(s.id, s.lat, s.lng, s.name);

        // Uzaklık
        if (userLatLng) {
          const dist = (userLatLng.distanceTo([s.lat, s.lng]) / 1000).toFixed(1);
          const dBox = document.getElementById(`dist-${s.id}`);
          if (dBox) { dBox.style.display = 'flex'; const sp = dBox.querySelector('span'); if(sp) sp.textContent = `${i18n[lang].dist}: ${dist} km`; }
        }

        // Hava + deniz verisi
        try {
          const [wRes, mRes] = await Promise.all([
            fetch(`https://api.open-meteo.com/v1/forecast?latitude=${s.lat}&longitude=${s.lng}&current_weather=true`),
            fetch(`https://marine-api.open-meteo.com/v1/marine?latitude=${s.lat}&longitude=${s.lng}&current=sea_surface_temperature,wave_height,wave_period&timezone=auto`)
          ]);
          const b = document.getElementById(`marine-${s.id}`);
          if (!b) return;
          let html = '';
          if (wRes.ok) {
            const w = (await wRes.json()).current_weather;
            html += `<div class="md-row"><span>${i18n[lang].marine_temp}:</span><span>${w.temperature}°C</span></div>`;
            html += `<div class="md-row"><span>${i18n[lang].marine_wind}:</span><span>${w.windspeed} km/s</span></div>`;
          }
          if (mRes.ok) {
            const md = (await mRes.json()).current;
            if (md) {
              if (md.sea_surface_temperature != null) html += `<div class="md-row"><span>${i18n[lang].marine_sea}:</span><span>${md.sea_surface_temperature.toFixed(1)}°C</span></div>`;
              if (md.wave_height != null) html += `<div class="md-row"><span>${i18n[lang].marine_wave}:</span><span>${md.wave_height.toFixed(1)} m</span></div>`;
              if (md.wave_period != null) html += `<div class="md-row"><span>${i18n[lang].marine_period}:</span><span>${md.wave_period.toFixed(0)} sn</span></div>`;
            }
          }
          b.innerHTML = html || `<span style="opacity:.5">${i18n[lang].no_data}</span>`;
        } catch(e) {
          const b = document.getElementById(`marine-${s.id}`);
          if (b) b.innerHTML = `<span style="opacity:.5">${i18n[lang].conn_error}</span>`;
        }
      });
      m.addTo(siteLayer);
      markerMap[s.id] = m;
    });

    SCHOOLS.forEach(sc => {
      const icon = makeIcon("", false, true);
      const sName = lang === 'en' ? (sc.name_en || sc.name) : sc.name;
      const sAddr = sc.address || '';
      const mapsUrl = `https://www.google.com/maps/search/${encodeURIComponent(sName + ' ' + sAddr)}/@${sc.lat},${sc.lng},15z`;
      const pop = `
        <div class="popup-inner">
          <div class="popup-koridor" style="color:#e74c3c">${i18n[lang].school_type}</div>
          <div class="popup-title">${sName}</div>
          ${sc.cert ? `<span class="cert-badge">${sc.cert}</span>` : ''}
          ${sAddr ? `<div class="popup-info-row" style="margin:5px 0 6px;">${SVG.pin} <span style="color:#3a6a8a">${sAddr}</span></div>` : ''}
          ${sc.phone ? `<div class="popup-info-row">${SVG.phone} <a href="tel:${sc.phone.replace(/ /g,'')}">${sc.phone}</a></div>` : ''}
          ${sc.web ? `<div class="popup-info-row">${SVG.globe} <a href="https://${sc.web}" target="_blank">${sc.web}</a></div>` : ''}
          <div style="display:flex;gap:5px;flex-wrap:wrap;margin-top:8px;">
            <a class="photo-search-btn" style="font-size:.72rem;padding:6px 9px;" href="${mapsUrl}" target="_blank">${SVG.pin} Google Maps</a>
            ${sc.tdv ? `<a class="photo-search-btn" style="font-size:.72rem;padding:6px 9px;" href="${sc.tdv}" target="_blank">${SVG.star} Tripadvisor</a>` : ''}
          </div>
          <div class="dist-badge" id="dist-${sc.id}" style="display:none;margin-top:6px;">${SVG.pin} <span></span></div>
        </div>`;
      L.marker([sc.lat, sc.lng], {icon}).bindPopup(pop).addTo(schoolLayer);
    });
  }

  let activeFilter = 'all';
  let searchVal = '';
  let activeDepth = null;
  let activeLevel = null;

  function showSearchButtons(wrap, siteName, lat, lng, siteId) {
    const terms = SEARCH_TERMS[siteId] || [siteName + ' scuba diving Turkey underwater', siteName + ' dalış sualtı Türkiye'];
    const gImgUrlEn = `https://www.google.com/search?q=${encodeURIComponent(terms[0])}&tbm=isch`;
    const gImgUrl   = `https://www.google.com/search?q=${encodeURIComponent(terms[1])}&tbm=isch`;
    const ytUrl     = `https://www.youtube.com/results?search_query=${encodeURIComponent(terms[0])}`;
    const mapsUrl   = `https://www.google.com/maps/search/${encodeURIComponent(terms[0])}/@${lat},${lng},13z`;

    wrap.innerHTML = `
      <div class="photo-search-bar">
        <a class="photo-search-btn" href="${gImgUrl}" target="_blank">${SVG.image} ${i18n[lang].photos_tr}</a>

        <a class="photo-search-btn" href="${ytUrl}" target="_blank">${SVG.play} YouTube</a>
        <a class="photo-search-btn" href="${mapsUrl}" target="_blank">${SVG.pin} Google Maps</a>
        <a class="photo-search-btn" style="grid-column:1/-1;font-size:.75rem;padding:9px;" href="${diveCtrUrl}" target="_blank">${SVG.anchor} ${i18n[lang].nearby_centers}</a>

  function loadGallery(siteId, siteLat, siteLng, siteName) {
    const wrap = document.getElementById('sb-' + siteId);
    if (!wrap || wrap.dataset.loaded) return;
    wrap.dataset.loaded = '1';
    showSearchButtons(wrap, siteName, siteLat, siteLng, siteId);
  }

  window.closeDetailPanel = function() {
    document.getElementById('detail-panel').classList.remove('open');
    document.querySelectorAll('.site-item').forEach(el => el.classList.remove('highlighted'));
  };

  function selectSite(id, lat, lng) {
    map.setView([lat, lng], 14);
    setTimeout(() => {
      const marker = markerMap[id];
      if (marker) marker.fire('click');
    }, 350);
    document.querySelectorAll('.site-item').forEach(el => el.classList.remove('highlighted'));
    const el = document.querySelector(`.site-item[data-id="${id}"]`);
    if (el) el.classList.add('highlighted');
  }

  function parseMaxDepth(derinlik) {
    // "5–35m", "28m", "10–80m" gibi formatlardan max değeri çıkar
    const nums = derinlik.replace(/[^\d–\-]/g,'').split(/[–\-]/).map(Number).filter(n=>!isNaN(n)&&n>0);
    return nums.length ? Math.max(...nums) : 0;
  }

  function matchesDepth(s) {
    if (!activeDepth) return true;
    const d = parseMaxDepth(s.derinlik);
    if (activeDepth === 'shallow') return d <= 18;
    if (activeDepth === 'mid')     return d > 18 && d <= 30;
    if (activeDepth === 'deep')    return d > 30;
    return true;
  }

  function matchesLevel(s) {
    if (!activeLevel) return true;
    const sv = s.seviye.toLowerCase();
    if (activeLevel === 'beginner')     return sv.includes('başlangıç') || sv.includes('tüm');
    if (activeLevel === 'intermediate') return sv.includes('orta') || sv.includes('tüm');
    if (activeLevel === 'advanced')     return sv.includes('ileri') || sv.includes('teknik') || sv.includes('tüm');
    return true;
  }

  function matches(s) {
    const matchF = (activeFilter === 'all') || (activeFilter === 'gem' ? s.gem : (Array.isArray(s.tur) && s.tur.includes(activeFilter)));
    const sName = lang === 'en' && s.name_en ? s.name_en : s.name;
    const matchS = !searchVal || sName.toLowerCase().includes(searchVal) || s.koridor.toLowerCase().includes(searchVal);
    return matchF && matchS && matchesDepth(s) && matchesLevel(s);
  }

  function renderSidebar() {
    const isSchoolView = false;
    const filtered = isSchoolView ? SCHOOLS : SITES.filter(matches);
    const groups = {};
    filtered.forEach(s => { if(!groups[s.koridor]) groups[s.koridor]=[]; groups[s.koridor].push(s); });
    
    let html = '';
    const ORDER = ["Marmara", "Çanakkale", "Ege", "Akdeniz", "Karadeniz", "Okullar"];
    
    ORDER.forEach(k => {
      if(!groups[k]) return;
      const cfg = KORIDOR_CONFIG[k];
      const isExp = searchVal.length > 0 || isSchoolView ? "expanded" : "";
      
      html += `<div class="sidebar-section ${isExp}">
        <div class="sidebar-section-header">
          <div class="ssh-dot" style="background:${cfg.color}"></div>
          <div class="ssh-title">${cfg["label_"+lang]} (${groups[k].length})</div>
          <div class="ssh-toggle">▼</div>
        </div>
        <div class="sidebar-section-content">`;
        
      groups[k].forEach(s => {
        let meta = "";
        const sName = lang === 'en' && s.name_en ? s.name_en : s.name;
        if(isSchoolView) { meta = `${SVG.phone} ${s.phone}`; }
        else {
          const seviyeLabel = lang === 'en' ? (dictSeviye[s.seviye] || s.seviye) : s.seviye;
          meta = `${SVG.arrowDown} ${s.derinlik} &nbsp;·&nbsp; ${seviyeLabel}`;
        }
        html += `<div class="site-item" data-id="${s.id}" onclick="selectSite('${s.id}', ${s.lat}, ${s.lng})">
          <div class="site-item-name">${sName} ${s.gem?'💎':''}</div>
          <div class="site-item-meta">${meta}</div>
        </div>`;
      });
      html += `</div></div>`;
    });
    document.getElementById('sidebar-content').innerHTML = html;
  }

  document.getElementById('filters').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn');
    if(!btn) return;
    if(btn.classList.contains('active') && btn.dataset.filter !== 'all') {
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      document.getElementById('f-all').classList.add('active');
      activeFilter = 'all';
    } else {
      document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
      btn.classList.add('active');
      activeFilter = btn.dataset.filter;
    }
    map.removeLayer(schoolLayer);
    map.addLayer(siteLayer);
    drawMap();
    renderSidebar();
  });

  // ── TOAST ──
  let toastTimer;
  function showToast(msg, duration=3500) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => t.classList.remove('show'), duration);
  }

  document.getElementById('seaMapToggle').addEventListener('click', function() {
    seaMapActive = !seaMapActive;
    this.classList.toggle('active', seaMapActive);
    if (seaMapActive) {
      seaMapLayer.addTo(map);
      if (map.getZoom() < 10) {
        showToast(i18n[lang].sea_map_zoom);
      } else {
        showToast(i18n[lang].sea_map_open);
      }
    } else {
      map.removeLayer(seaMapLayer);
      showToast(i18n[lang].sea_map_close);
    }
  });

  // ── DROPDOWN HELPER ──
  function setupDropdown(wrapId, onSelect) {
    const wrap = document.getElementById(wrapId);
    const trigger = wrap.querySelector('.dd-trigger');
    trigger.addEventListener('click', e => {
      e.stopPropagation();
      // Diğer açık dropdown'ları kapat
      document.querySelectorAll('.dd-wrap.open').forEach(w => { if(w !== wrap) w.classList.remove('open'); });
      wrap.classList.toggle('open');
    });
    wrap.querySelector('.dd-menu').addEventListener('click', e => {
      const item = e.target.closest('.dd-item');
      if (!item) return;
      onSelect(item);
      wrap.classList.remove('open');
    });
  }

  // Tüm dropdown'ları dışarı tıklayınca kapat
  document.addEventListener('click', () => {
    document.querySelectorAll('.dd-wrap.open').forEach(w => w.classList.remove('open'));
  });

  // ── DROPDOWN UI GÜNCELLEME ──
  function updateDropdownLabels() {
    const t = i18n[lang];
    // Derinlik trigger başlığı (filtre seçili değilse)
    if (!activeDepth) document.getElementById('depthTriggerLabel').textContent = t.depth_label;
    // Seviye trigger başlığı (filtre seçili değilse)
    if (!activeLevel) document.getElementById('levelTriggerLabel').textContent = t.level_label;
    // Dropdown menü başlıkları
    document.getElementById('depthMenuHeader').textContent = t.depth_header;
    document.getElementById('levelMenuHeader').textContent = t.level_header;
    // Derinlik item'ları
    document.getElementById('dd-shallow').innerHTML = `${t.shallow} <span style="opacity:.5;font-size:.75rem">${t.shallow_range}</span>`;
    document.getElementById('dd-mid').innerHTML = `${t.mid} <span style="opacity:.5;font-size:.75rem">${t.mid_range}</span>`;
    document.getElementById('dd-deep').innerHTML = `${t.deep} <span style="opacity:.5;font-size:.75rem">${t.deep_range}</span>`;
    document.getElementById('dd-depth-clear').textContent = t.clear_filter;
    // Seviye item'ları
    document.getElementById('dd-beginner').textContent = t.lv_easy;
    document.getElementById('dd-intermediate').textContent = t.lv_med;
    document.getElementById('dd-advanced').textContent = t.lv_hard;
    document.getElementById('dd-level-clear').textContent = t.clear_filter;
    // Sea map butonu
    document.getElementById('seaMapLabel').textContent = t.sea_map;
    // Eğer filtre seçiliyse trigger text'i güncelle
    if (activeDepth) {
      const depthKeyMap = { shallow: 'shallow', mid: 'mid', deep: 'deep' };
      const key = depthKeyMap[activeDepth];
      if (key) document.getElementById('depthTriggerLabel').textContent = `${t[key]} ${t[key+'_range']}`;
    }
    if (activeLevel) {
      const levelKeyMap = { beginner: 'lv_easy', intermediate: 'lv_med', advanced: 'lv_hard' };
      const key = levelKeyMap[activeLevel];
      if (key) document.getElementById('levelTriggerLabel').textContent = t[key];
    }
  }

    drawMap(); renderSidebar();
  });

  document.getElementById('sidebar-content').addEventListener('click', e => {
    const h = e.target.closest('.sidebar-section-header');
    if (h) h.parentElement.classList.toggle('expanded');
  });

  document.getElementById('search').addEventListener('input', e => { searchVal = e.target.value.toLowerCase(); renderSidebar(); drawMap(); });

  document.getElementById('locateBtn').addEventListener('click', () => map.locate({setView: true, maxZoom: 10}));

  // İlk Başlatma Rutini
  handleZoom();
  drawRegionLabels();
  renderBadges();
  updateDropdownLabels();
  drawMap();
  renderSidebar();

} catch (e) {
  console.error("Script Hatası:", e);
}
</script>
</body>
</html>
